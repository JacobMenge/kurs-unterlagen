name: Deploy MkDocs to GitHub Pages

on:
  # Baut und deployt bei jedem Push auf main / master
  push:
    branches: ["main", "master"]

  # Ermoeglicht manuelles Triggern ueber den Actions-Tab
  workflow_dispatch:

# Setzt die Berechtigungen des GITHUB_TOKEN so, dass deploy auf GitHub Pages erlaubt ist
permissions:
  contents: read
  pages: write
  id-token: write

# Nur ein laufender Deploy gleichzeitig; laufende Deployments nicht abbrechen
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Cache pip dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Build MkDocs site
        run: mkdocs build --strict

      - name: Setup Pages
        uses: actions/configure-pages@v4
        with:
          # Aktiviert GitHub Pages automatisch, falls noch nicht geschehen
          enablement: true

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./site

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
